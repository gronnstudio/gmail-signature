<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRØNN Gmail Signature</title>
</head>
<body style="margin:0;padding:18px;background:#edf3ef;font-family:Arial,Helvetica,sans-serif;">
  <style>
    @keyframes greetingFloat {
      0% { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .greeting-animate {
      animation: greetingFloat 900ms ease-out both;
    }

    @media (prefers-reduced-motion: reduce) {
      .greeting-animate {
        animation: none !important;
      }
    }
  </style>

  <div style="width:100%;max-width:760px;margin:0 auto;">
    <div class="greeting-animate"
      style="margin:0 0 12px 2px;font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:27px;line-height:1.12;color:#6f8075;">
      Met vriendelijke groet,
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0"
      style="width:100%;border-collapse:separate;background:#ffffff;border:1px solid #d7dfd9;border-radius:18px;box-shadow:0 12px 28px rgba(16,43,33,0.08);overflow:hidden;">
      <tr>
        <td>
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;border-collapse:collapse;">
            <tr>
              <td style="height:9px;background:#0b6d61;"></td>
              <td style="height:9px;background:#ef6a1a;width:120px;"></td>
            </tr>
          </table>

          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;border-collapse:collapse;">
            <tr>
              <td style="width:180px;padding:22px 18px 18px 22px;vertical-align:top;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                  style="border-collapse:separate;background:#f4f8f5;border:1px solid #dde7e0;border-radius:16px;box-shadow:0 4px 12px rgba(11,61,49,0.06);">
                  <tr>
                    <td style="padding:12px;">
                      <img
                        src="assets/logo-vierkant.png"
                        alt="GRØNN logo"
                        width="128"
                        height="128"
                        style="display:block;width:128px;height:128px;border:0;border-radius:12px;object-fit:cover;background:#dce7e1;"
                      />

                      <img
                        src="assets/logo-profile.png"
                        alt="Nick Peters profielbeeld"
                        width="128"
                        height="128"
                        style="display:block;width:128px;height:128px;margin-top:10px;border:0;border-radius:12px;object-fit:cover;background:#dce7e1;"
                      />
                    </td>
                  </tr>
                </table>
              </td>

              <td style="padding:22px 24px 18px 0;vertical-align:top;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;border-collapse:collapse;">
                  <tr>
                    <td style="font-size:14px;line-height:1.45;color:#24342c;">
                      <div style="font-size:26px;font-weight:700;line-height:1.04;color:#163126;letter-spacing:0.01em;">
                        Nick Peters
                      </div>

                      <div style="margin-top:7px;font-size:13px;line-height:1.45;color:#587064;">
                        Ecologisch ontwerper <span style="color:#a8b4ad;">·</span> GRØNN Studio
                      </div>

                      <div style="margin-top:14px;width:62px;height:4px;background:#ef6a1a;border-radius:999px;"></div>

                      <div style="margin-top:15px;padding:0 0 0 0;">
                        <div style="font-size:15px;font-weight:400;line-height:1.3;color:#20372d;">
                          Designing Living Ecosystems
                        </div>
                        <div style="margin-top:4px;font-size:13px;line-height:1.35;color:#6f8075;font-style:italic;">
                          Rooted in nature, shaped for life
                        </div>
                      </div>

                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:16px;border-collapse:collapse;">
                        <tr>
                          <td style="font-size:13px;line-height:1.5;color:#587064;">
                            <a href="https://gronn.studio" style="color:#01696f;text-decoration:none;font-weight:700;">
                              gronn.studio
                            </a>
                            <span style="color:#b7c1bb;"> · </span>
                            Stein, Limburg, NL
                          </td>
                        </tr>
                      </table>

                      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:16px;border-collapse:collapse;">
                        <tr>
                          <td style="padding-right:10px;">
                            <a href="https://instagram.com/gronn.studio"
                               style="display:block;width:38px;height:38px;background:#f4f8f5;border:1px solid #d9e4dd;border-radius:999px;text-decoration:none;box-shadow:0 2px 6px rgba(11,61,49,0.04);">
                              <img
                                src="assets/icons/instagram-icon.avif"
                                alt="Instagram"
                                width="20"
                                height="20"
                                style="display:block;width:20px;height:20px;margin:9px auto;border:0;"
                              />
                            </a>
                          </td>
                          <td>
                            <a href="https://wa.me/31618118014"
                               style="display:block;width:38px;height:38px;background:#f4f8f5;border:1px solid #d9e4dd;border-radius:999px;text-decoration:none;box-shadow:0 2px 6px rgba(11,61,49,0.04);">
                              <img
                                src="assets/icons/whatsapp-icon.avif"
                                alt="WhatsApp"
                                width="20"
                                height="20"
                                style="display:block;width:20px;height:20px;margin:9px auto;border:0;"
                              />
                            </a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>

          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;border-collapse:collapse;">
            <tr>
              <td style="padding:0 22px 22px 22px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                  style="width:100%;border-collapse:separate;background:#e4f2ec;border:1px solid #bedbce;border-radius:999px;">
                  <tr>
                    <td style="padding:12px 16px;color:#0b6d61;font-size:11px;line-height:1.4;text-align:center;">
                      Bij GRØNN ontwerpen we voor levende ecosystemen — print deze e-mail alleen als het echt nodig is.
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
